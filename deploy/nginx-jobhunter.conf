# Nginx reverse proxy for the Job Hunter dashboard (PM2 on port 3010).
#
# Install:
#   sudo cp deploy/nginx-jobhunter.conf /etc/nginx/sites-available/jobhunter
#   sudo ln -s /etc/nginx/sites-available/jobhunter /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d kaguyatop.dev   # adds HTTPS (443) + auto-renew
#
# After certbot runs, it rewrites this file to add the 443 server block and a
# redirect from 80 -> 443 automatically; you don't edit TLS by hand.

server {
    listen 80;
    listen [::]:80;
    server_name kaguyatop.dev;

    # Monitor ingest can take up to ~60s for large batches.
    client_max_body_size 16m;

    location / {
        proxy_pass http://127.0.0.1:3010;   # dashboard (PM2: jobhunter-dashboard)
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
